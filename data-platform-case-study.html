<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Platform | Case Study</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      .case-study.container {
        max-width: 900px;
        margin: 120px auto 100px;
        padding: 0 24px;
        text-align: center;
      }
      .case-study h2 {
        text-align: center;
      }
      .case-study img {
        width: 100%;
        border-radius: 12px;
        margin: 24px 0;
        display: block;
      }
    </style>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>

    <!-- GLOBAL FLUID CURSOR -->
  <canvas id="fluid"></canvas>

  <!-- HEADER -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <a href="index.html" style="color: inherit; text-decoration: none;">SG</a>
      </div>
      <nav class="nav">
        <a href="index.html#work">Work</a>
        <a href="index.html#process">Process</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>
    <a href="index.html">Back</a>
  </div>

  <div class="case-study container">
    <section class="section" style="padding: 0;">
      <h2 class="fade-in">Data Intelligence Platform – Dashboard UX</h2>
      <p class="fade-in" style="color: #94a3b8; font-size: 18px;">Simplifying dense data and improving decision-making for enterprise teams.</p>
      
      <img src="assets/data-platform/screen1.png" alt="Data Platform screen 1" class="fade-in" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'800\' height=\'400\'><rect width=\'100%\' height=\'100%\' fill=\'%230f172a\'/></svg>'" />
      <img src="assets/data-platform/screen2.png" alt="Data Platform screen 2" class="fade-in" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'800\' height=\'400\'><rect width=\'100%\' height=\'100%\' fill=\'%230f172a\'/></svg>'" />
    </section>
  </div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add("visible");
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll(".fade-in").forEach(el => observer.observe(el));
  </script>
  <script src="js/splashCursor.js"></script>
</body>
</html>
