<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bananaz | Case Study</title>
    <link rel="stylesheet" href="styles.css">
    <!-- OGL for Plasma -->
    <script>var exports = {};</script>
    <script src="https://cdn.jsdelivr.net/npm/ogl@0.0.32/dist/ogl.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      .coming-soon-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .coming-soon-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 99px;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.25);
        color: #3b82f6;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 40px;
      }
      .coming-soon-badge::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3b82f6;
        animation: pulse-dot 2s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(0.8); }
      }
      .coming-soon-title {
        font-size: clamp(48px, 6vw, 72px);
        font-family: 'Satoshi', sans-serif;
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 24px;
        background: linear-gradient(180deg, #ffffff 0%, #64748b 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .coming-soon-sub {
        font-size: 20px;
        color: #64748b;
        line-height: 1.6;
        max-width: 560px;
        margin-bottom: 48px;
      }
      .coming-soon-back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 32px;
        border-radius: 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #e2e8f0;
        text-decoration: none;
        font-weight: 500;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      .coming-soon-back:hover {
        background: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.2);
        transform: translateY(-2px);
      }
    </style>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body>

  <!-- BACKGROUND SYSTEM -->
  <div id="plasma-layer" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-grid-micro" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>
  <canvas id="fluid"></canvas>
  <div id="color-bends-bg"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="logo"><a href="index.html" style="color:inherit; text-decoration:none;">Sai Teja Govind</a></div>
    <nav>
      <a href="index.html#work">Work</a>
      <a href="index.html#process">Process</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </header>

  <div class="coming-soon-container">
    <div class="coming-soon-badge">In Progress</div>
    <h1 class="coming-soon-title scroll-reveal" data-base-rotation="5" data-blur-strength="10">Bananaz</h1>
    <p class="coming-soon-sub">Brand identity & digital experience case study. Currently being documented — check back soon for the full story behind the visual system, packaging design, and digital presence.</p>
    <a href="index.html" class="coming-soon-back">← Back to Portfolio</a>
  </div>

  <script src="js/splashCursor.js"></script>
  <script src="js/plasma.js"></script>
  <script src="js/colorBends.js"></script>
  <script src="js/scrollReveal.js"></script>
</body>
</html>
